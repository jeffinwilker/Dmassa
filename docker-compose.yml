name: dmassa

services:
  postgres:
    image: postgres:16-alpine
    container_name: dmassa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dmassa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dmassa}
      POSTGRES_MULTIPLE_DATABASES: dmassa,evolution
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres-init.sh:/docker-entrypoint-initdb.d/postgres-init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dmassa}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: dmassa-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:-dmassa}"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-dmassa}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: dmassa-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-dmassa}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-dmassa-minio-secret}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    container_name: dmassa-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-dmassa} ${MINIO_ROOT_PASSWORD:-dmassa-minio-secret} &&
      mc mb -p local/${MINIO_BUCKET:-dmassa-media} || true &&
      mc anonymous set download local/${MINIO_BUCKET:-dmassa-media} || true &&
      echo 'MinIO bucket ready'
      "

  evolution:
    image: evoapicloud/evolution-api:latest
    container_name: dmassa-evolution
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${EVOLUTION_PORT:-8080}:8080"
    volumes:
      - evolution_instances:/evolution/instances
    environment:
      SERVER_TYPE: http
      SERVER_PORT: 8080
      SERVER_URL: ${EVOLUTION_URL:-http://localhost:8080}

      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-change-me-please}
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"

      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://${POSTGRES_USER:-dmassa}:${POSTGRES_PASSWORD:-dmassa}@postgres:5432/evolution?schema=public
      DATABASE_CONNECTION_CLIENT_NAME: evolution
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"

      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://:${REDIS_PASSWORD:-dmassa}@redis:6379/1
      CACHE_REDIS_PREFIX_KEY: evolution
      CACHE_LOCAL_ENABLED: "false"

      WEBHOOK_GLOBAL_ENABLED: "true"
      WEBHOOK_GLOBAL_URL: ${WEBHOOK_URL:-http://host.docker.internal:3000/api/webhooks/evolution}
      WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS: "false"
      WEBHOOK_EVENTS_MESSAGES_UPSERT: "true"
      WEBHOOK_EVENTS_MESSAGES_UPDATE: "true"
      WEBHOOK_EVENTS_CONNECTION_UPDATE: "true"
      WEBHOOK_EVENTS_QRCODE_UPDATED: "true"
      WEBHOOK_EVENTS_SEND_MESSAGE: "true"

      CONFIG_SESSION_PHONE_CLIENT: Dmassa
      CONFIG_SESSION_PHONE_NAME: Chrome
      QRCODE_LIMIT: 30

      LOG_LEVEL: ERROR,WARN,INFO
      LOG_COLOR: "true"
      DEL_INSTANCE: "false"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
  minio_data:
  evolution_instances:
