# =========================================================================
# Nginx - site do Dmassa
# Instale em /etc/nginx/sites-available/dmassa e link em sites-enabled.
#
# Antes do SSL, use APENAS o bloco "HTTP puro" abaixo (comente o HTTPS).
# Rode:
#   sudo certbot --nginx -d SEU-DOMINIO
# O certbot injeta os "listen 443 ssl" e ajusta o redirect. Depois nunca
# mais precise mexer aqui (renovacao automatica).
# =========================================================================

server {
    listen 80;
    listen [::]:80;
    server_name SEU-DOMINIO;                    # ex: 203-0-113-42.sslip.io

    # Necessario pro challenge do certbot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Proxy pro Next.js via PM2 (porta configurada em APP_PORT)
    location / {
        proxy_pass http://127.0.0.1:3100;       # ajuste conforme APP_PORT
        proxy_http_version 1.1;

        # Headers padrao pra Next.js atras de proxy
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # WebSocket / SSE (Next.js dev + Server Actions streaming)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts amigaveis pra QR polling, envios longos e uploads grandes
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_request_buffering off;

        # Uploads de midia podem ser grandes (video, audio) — ate 200MB no app
        client_max_body_size 250M;
        client_body_timeout 300s;
    }

    # Cache agressivo pra assets do Next
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3100;
        proxy_cache_bypass 0;
        add_header Cache-Control "public, max-age=31536000, immutable";
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
